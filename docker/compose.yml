name: synaptix

services:
  # ================================
  # Databases
  # ================================
  postgres:
    image: postgres:16-alpine
    container_name: synaptix_postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-synaptix_db}"
      POSTGRES_USER: "${POSTGRES_USER:-synaptix_user}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required. Run: dotnet run --project Synaptix.Setup -- init-local}"
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init/postgres:/docker-entrypoint-initdb.d
    networks: [synaptix-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-synaptix_user} -d ${POSTGRES_DB:-synaptix_db}"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7.0
    container_name: synaptix_mongodb
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: "${MONGO_INITDB_ROOT_USERNAME:-synaptix_admin}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_INITDB_ROOT_PASSWORD:?MONGO_INITDB_ROOT_PASSWORD is required. Run: dotnet run --project Synaptix.Setup -- init-local}"
      MONGO_INITDB_DATABASE: "${MONGO_INITDB_DATABASE:-synaptix_db}"
      MONGO_APP_USER: "${MONGO_APP_USER:-synaptix_app_user}"
      MONGO_APP_PASSWORD: "${MONGO_APP_PASSWORD:?MONGO_APP_PASSWORD is required. Run: dotnet run --project Synaptix.Setup -- init-local}"
      MONGO_APP_DB: "${MONGO_APP_DB:-synaptix_analytics}"
      MONGO_AUTH_DB: "${MONGO_AUTH_DB:-synaptix_analytics}"
      MONGO_ANALYTICS_DB: "${MONGO_ANALYTICS_DB:-synaptix_analytics}"
      MONGO_CRYPTO_DB: "${MONGO_CRYPTO_DB:-synaptix_crypto}"
      MONGO_CRYPTO_USER: "${MONGO_CRYPTO_USER:-${MONGO_APP_USER:-synaptix_app_user}}"
      MONGO_CRYPTO_PASSWORD: "${MONGO_CRYPTO_PASSWORD:-${MONGO_APP_PASSWORD:-synaptix_app_password_123}}"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ./init/mongo:/docker-entrypoint-initdb.d
    networks: [synaptix-net]
    healthcheck:
      test: ["CMD", "mongosh", "--authenticationDatabase=${MONGO_AUTH_DB:-synaptix_analytics}", "-u", "${MONGO_APP_USER:-synaptix_app_user}", "-p", "${MONGO_APP_PASSWORD:-synaptix_app_password_123}", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ================================
  # Caching & Search
  # ================================
  redis:
    image: redis:7.4.9-alpine
    container_name: synaptix_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass '${REDIS_PASSWORD:?REDIS_PASSWORD is required}'"]
    volumes:
      - redis_data:/data
    networks: [synaptix-net]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a '${REDIS_PASSWORD}' ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: synaptix_elasticsearch
    restart: unless-stopped
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.enrollment.enabled=false
      - "ELASTIC_PASSWORD=${ELASTIC_PASSWORD:?ELASTIC_PASSWORD is required. Run: dotnet run --project Synaptix.Setup -- init-local}"
      - ES_JAVA_OPTS=${ES_JAVA_OPTS:--Xms512m -Xmx512m}
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks: [synaptix-net]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -u elastic:${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health?pretty >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10

  # ================================
  # Message Queue
  # ================================
  rabbitmq:
    image: rabbitmq:management-alpine
    container_name: synaptix_rabbitmq
    restart: unless-stopped
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USER:-synaptix_user}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required. Run: dotnet run --project Synaptix.Setup -- init-local}"
      RABBITMQ_DEFAULT_VHOST: "${RABBITMQ_VHOST:-synaptix}"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks: [synaptix-net]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ================================
  # Object Storage
  # ================================
  minio:
    image: minio/minio:latest
    container_name: synaptix_minio
    restart: unless-stopped
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-synaptix_minio_user}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required. Run: dotnet run --project Synaptix.Setup -- init-local}"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks: [synaptix-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ================================
  # Monitoring (Dev Profile)
  # ================================
  prometheus:
    image: prom/prometheus:latest
    container_name: synaptix_prometheus
    restart: unless-stopped
    profiles: ["dev"]
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/rules:/etc/prometheus/rules
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks: [synaptix-net]
    depends_on:
      - alertmanager

  alertmanager:
    image: prom/alertmanager:latest
    container_name: synaptix_alertmanager
    restart: unless-stopped
    profiles: ["dev"]
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    environment:
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-https://hooks.slack.com/services/YOUR/WEBHOOK/URL}
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks: [synaptix-net]

  grafana:
    image: grafana/grafana:latest
    container_name: synaptix_grafana
    restart: unless-stopped
    profiles: ["dev"]
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:?GRAFANA_PASSWORD is required. Run: dotnet run --project Synaptix.Setup -- init-local}"
      GF_INSTALL_PLUGINS: "grafana-clock-panel,grafana-simple-json-datasource"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks: [synaptix-net]

  # ================================
  # Admin UIs
  # ================================
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: synaptix_kibana
    restart: unless-stopped
    profiles: ["dev"]
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - "ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD:?ELASTIC_PASSWORD is required. Run: dotnet run --project Synaptix.Setup -- init-local}"
    depends_on:
      - elasticsearch
    networks: [synaptix-net]

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: synaptix_pgadmin
    restart: unless-stopped
    profiles: ["dev"]
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: "${PGADMIN_DEFAULT_EMAIL:-admin@synaptix.app}"
      PGADMIN_DEFAULT_PASSWORD: "${PGADMIN_DEFAULT_PASSWORD:?PGADMIN_DEFAULT_PASSWORD is required. Run: dotnet run --project Synaptix.Setup -- init-local}"
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks: [synaptix-net]

  mongo-express:
    image: mongo-express:latest
    container_name: synaptix_mongo_express
    restart: unless-stopped
    profiles: ["dev"]
    ports:
      - "${MONGO_EXPRESS_PORT:-8081}:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: "${MONGO_INITDB_ROOT_USERNAME:-synaptix_admin}"
      ME_CONFIG_MONGODB_ADMINPASSWORD: "${MONGO_INITDB_ROOT_PASSWORD}"
      ME_CONFIG_MONGODB_URL: "mongodb://${MONGO_INITDB_ROOT_USERNAME:-synaptix_admin}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/"
      ME_CONFIG_BASICAUTH_USERNAME: "${MONGO_EXPRESS_USERNAME:-admin}"
      ME_CONFIG_BASICAUTH_PASSWORD: "${MONGO_EXPRESS_PASSWORD:?MONGO_EXPRESS_PASSWORD is required. Run: dotnet run --project Synaptix.Setup -- init-local}"
    depends_on:
      - mongodb
    networks: [synaptix-net]

  dbgate:
      image: dbgate/dbgate:latest
      container_name: synaptix_dbgate
      restart: unless-stopped
      profiles: ["dev"]
      ports:
        - "${DBGATE_PORT:-3001}:3000"
      environment:
        CONNECTIONS: synaptix_postgres,synaptix_mongodb

        LABEL_synaptix_postgres: "Synaptix PostgreSQL"
        SERVER_synaptix_postgres: postgres
        PORT_synaptix_postgres: 5432
        ENGINE_synaptix_postgres: postgres@dbgate-plugin-postgres
        USER_synaptix_postgres: "${POSTGRES_USER:-synaptix_user}"
        PASSWORD_synaptix_postgres: "${POSTGRES_PASSWORD}"
        DATABASE_synaptix_postgres: "${POSTGRES_DB:-synaptix_db}"

        LABEL_synaptix_mongodb: "Synaptix MongoDB"
        SERVER_synaptix_mongodb: mongodb
        PORT_synaptix_mongodb: 27017
        ENGINE_synaptix_mongodb: mongo@dbgate-plugin-mongo
        USER_synaptix_mongodb: "${MONGO_INITDB_ROOT_USERNAME:-synaptix_admin}"
        PASSWORD_synaptix_mongodb: "${MONGO_INITDB_ROOT_PASSWORD}"
        DATABASE_synaptix_mongodb: "${MONGO_INITDB_DATABASE:-synaptix_db}"
        URL_synaptix_mongodb: "mongodb://${MONGO_INITDB_ROOT_USERNAME:-synaptix_admin}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/${MONGO_INITDB_DATABASE:-synaptix_db}?authSource=admin"
      depends_on:
        - postgres
        - mongodb
      networks: [synaptix-net]

  # ================================
  # Reverse Proxy
  # ================================
  traefik:
    image: traefik:v3.2
    container_name: synaptix_traefik
    restart: unless-stopped
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--log.level=INFO"
    ports:
      - "${TRAEFIK_HTTP_PORT:-80}:80"
      - "${TRAEFIK_DASHBOARD_PORT:-8080}:8080"
    volumes:
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - letsencrypt:/letsencrypt
    networks: [synaptix-net]

  # ================================
  # Backend Services
  # ================================

  # One-shot setup container: provisions MinIO bucket, uploads seed files,
  # validates secrets, and creates the super admin. Runs before migration.
  setup:
    build:
      context: ..
      dockerfile: docker/Dockerfile.setup
      args:
        - BUILD_CONFIGURATION="${BUILD_CONFIGURATION:-Release}"
    container_name: synaptix_setup
    restart: "no"
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Development}"
      DOTNET_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Development}"
      ConnectionStrings__db: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-synaptix_db};Username=${POSTGRES_USER:-synaptix_user};Password=${POSTGRES_PASSWORD}"
      # MongoDB — root connection for provisioning; app credentials for user creation
      MONGO_HOST: "mongodb"
      MONGO_PORT: "27017"
      MONGO_INITDB_ROOT_USERNAME: "${MONGO_INITDB_ROOT_USERNAME:-synaptix_admin}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_INITDB_ROOT_PASSWORD}"
      MONGO_APP_USER: "${MONGO_APP_USER:-synaptix_app_user}"
      MONGO_APP_PASSWORD: "${MONGO_APP_PASSWORD}"
      MONGO_AUTH_DB: "${MONGO_AUTH_DB:-synaptix_analytics}"
      MONGO_ANALYTICS_DB: "${MONGO_ANALYTICS_DB:-synaptix_analytics}"
      MONGO_CRYPTO_DB: "${MONGO_CRYPTO_DB:-synaptix_crypto}"
      Setup__Mongo__RemoveLegacyAdminAppUser: "${SETUP_MONGO_REMOVE_LEGACY_ADMIN_APP_USER:-false}"
      # Redis
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      # Elasticsearch
      ConnectionStrings__elasticsearch: "http://elasticsearch:9200"
      Elastic__Url: "http://elasticsearch:9200"
      Elastic__Username: "elastic"
      Elastic__Password: "${ELASTIC_PASSWORD}"
      ELASTIC_PASSWORD: "${ELASTIC_PASSWORD}"
      MinIO__Endpoint: "minio:9000"
      MinIO__AccessKey: "${MINIO_ROOT_USER:-synaptix_minio_user}"
      MinIO__SecretKey: "${MINIO_ROOT_PASSWORD}"
      MinIO__Bucket: "${MINIO_BUCKET:-synaptix-assets}"
      MinIO__UseSSL: "false"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Port: "${RABBITMQ_PORT:-5672}"
      RabbitMQ__User: "${RABBITMQ_USER:-synaptix_user}"
      RabbitMQ__Password: "${RABBITMQ_PASSWORD}"
      RabbitMQ__Vhost: "${RABBITMQ_VHOST:-synaptix}"
      RabbitMQ__ManagementPort: "${RABBITMQ_MANAGEMENT_PORT:-15672}"
      SuperAdmin__Email: "${SUPER_ADMIN_EMAIL:-}"
      SuperAdmin__Password: "${SUPER_ADMIN_PASSWORD:-}"
      SuperAdmin__Handle: "${SUPER_ADMIN_HANDLE:-superadmin}"
      Setup__Command: "provision-services"
      Setup__SeedsSourcePath: "/app/seeds"
      Serilog__MinimumLevel: "${LOG_LEVEL:-Information}"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks: [synaptix-net]

  migration:
    build:
      context: ..
      dockerfile: docker/Dockerfile.migration-service
      args:
        - BUILD_CONFIGURATION="${BUILD_CONFIGURATION:-Release}"
    container_name: synaptix_migration
    restart: "no"
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Development}"
      DOTNET_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Development}"
      
      # Database connections
      ConnectionStrings__db: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-synaptix_db};Username=${POSTGRES_USER:-synaptix_user};Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__redis: "redis:6379,password=${REDIS_PASSWORD}"
      ConnectionStrings__mongo: "mongodb://${MONGO_APP_USER:-synaptix_app_user}:${MONGO_APP_PASSWORD}@mongodb:27017/${MONGO_ANALYTICS_DB:-synaptix_analytics}?authSource=${MONGO_AUTH_DB:-synaptix_analytics}"
      ConnectionStrings__elasticsearch: "http://elasticsearch:9200"

      # Elasticsearch
      Elastic__Url: "http://elasticsearch:9200"
      Elastic__Username: "elastic"
      Elastic__Password: "${ELASTIC_PASSWORD}"
      
      # MongoDB
      MongoSettings__Database: "${MONGO_ANALYTICS_DB:-synaptix_analytics}"
      
      # Super admin seed (idempotent — only creates the account if it doesn't exist)
      SuperAdmin__Email: "${SUPER_ADMIN_EMAIL:-}"
      SuperAdmin__Password: "${SUPER_ADMIN_PASSWORD:-}"
      SuperAdmin__Handle: "${SUPER_ADMIN_HANDLE:-superadmin}"

      # Migration settings
      MigrationService__Mode: "${MIGRATION_MODE:-MigrateAndSeed}"
      MigrationService__SeedSource: "${MIGRATION_SEED_SOURCE:-Auto}"
      MigrationService__AllowEnsureCreated: "${MIGRATION_ALLOW_ENSURE_CREATED:-false}"
      MigrationService__ResetDatabase: "${MIGRATION_RESET_DATABASE:-false}"
      MigrationService__AutoRepairOnMissingTables: "${MIGRATION_AUTO_REPAIR_MISSING_TABLES:-true}"
      MigrationService__DashboardReadiness__Enabled: "${MIGRATION_DASHBOARD_READINESS_ENABLED:-true}"
      MigrationService__DashboardReadiness__Strict: "${MIGRATION_DASHBOARD_READINESS_STRICT:-true}"
      MigrationService__RebuildElastic__Enabled: "${REBUILD_ELASTIC:-false}"

      # Seed object keys. The bucket is MinIO__Bucket; do not include the bucket name in these keys.
      MinIO__Bucket: "${MINIO_BUCKET:-synaptix-assets}"
      MinIO__Endpoint: "minio:9000"
      MinIO__AccessKey: "${MINIO_ROOT_USER:-synaptix_minio_user}"
      MinIO__SecretKey: "${MINIO_ROOT_PASSWORD}"
      MinIO__UseSSL: "false"
      MinIO__Seeds__StoreItemsKey: "${MINIO_SEED_STORE_ITEMS_KEY:-seeds/store-items.json}"
      MinIO__Seeds__SkillNodesKey: "${MINIO_SEED_SKILL_NODES_KEY:-seeds/skill-nodes.json}"
      MinIO__Seeds__SeasonRewardsKey: "${MINIO_SEED_SEASON_REWARDS_KEY:-seeds/season-rewards.json}"
      MinIO__Seeds__QuestionsKey: "${MINIO_SEED_QUESTIONS_KEY:-seeds/questions.json}"
      
      # Observability
      Observability__ServiceName: "Synaptix.MigrationService"
      Serilog__MinimumLevel: "${LOG_LEVEL:-Information}"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      setup:
        condition: service_completed_successfully
    networks: [synaptix-net]

  backend-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
      args:
        BUILD_CONFIGURATION: "${BUILD_CONFIGURATION:-Release}"
    container_name: synaptix_backend_api
    restart: unless-stopped
    ports:
      - "${BACKEND_HTTP_PORT:-5000}:5000"
      - "${BACKEND_GRPC_PORT:-5001}:5001"   # gRPC / HTTP2 — sidecar only
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Development}"
      ASPNETCORE_URLS: ""   # Kestrel dual-port config in Program.cs overrides this
      
      # Database connections
      ConnectionStrings__db: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-synaptix_db};Username=${POSTGRES_USER:-synaptix_user};Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__redis: "redis:6379,password=${REDIS_PASSWORD},defaultDatabase=0"
      ConnectionStrings__mongo: "mongodb://${MONGO_APP_USER:-synaptix_app_user}:${MONGO_APP_PASSWORD}@mongodb:27017/${MONGO_ANALYTICS_DB:-synaptix_analytics}?authSource=${MONGO_AUTH_DB:-synaptix_analytics}"
      ConnectionStrings__elasticsearch: "http://elastic:${ELASTIC_PASSWORD}@elasticsearch:9200"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Port: "5672"

      # Elasticsearch
      Elastic__Url: "http://elasticsearch:9200"
      Elastic__Username: "elastic"
      Elastic__Password: "${ELASTIC_PASSWORD}"
      Elastic__DailyWriteAlias: "synaptix-daily-rollups-write"
      Elastic__PlayerDailyWriteAlias: "synaptix-player-daily-rollups-write"
      # Dev only: allow self-signed certs. Do NOT set this in production.
      Elastic__SkipCertificateValidation: "${ELASTIC_SKIP_CERT_VALIDATION:-false}"
      
      # MongoDB
      Mongo__Database: "${MONGO_ANALYTICS_DB:-synaptix_analytics}"
      MongoSettings__Database: "${MONGO_ANALYTICS_DB:-synaptix_analytics}"
      
      # Hangfire
      Hangfire__Enabled: "${HANGFIRE_ENABLED:-true}"
      Hangfire__DashboardPath: "/hangfire"
      
      # Analytics
      Analytics__Enabled: "${ANALYTICS_ENABLED:-true}"
      
      # Admin Ops
      AdminOps__Enabled: "${ADMIN_OPS_ENABLED:-true}"
      AdminOps__Header: "X-Admin-Ops-Key"
      AdminOps__Key: "${ADMIN_OPS_KEY:-CHANGE_ME}"
      AdminAuth__AllowTrustedBffPlainJson: "${ADMIN_AUTH_ALLOW_TRUSTED_BFF_PLAIN_JSON:-true}"
      KmsClient__BaseUrl: "${KMS_API_BASE_URL:-http://kms-api:5050}"
      KmsClient__ServiceToken: "${KMS_SERVICE_TOKEN:-}"
      KmsClient__Required: "${KMS_CLIENT_REQUIRED:-false}"
      ComplianceClient__BaseUrl: "${COMPLIANCE_API_BASE_URL:-http://compliance-api:5070}"
      ComplianceClient__ServiceToken: "${COMPLIANCE_SERVICE_TOKEN:-}"
      ComplianceClient__Required: "${COMPLIANCE_CLIENT_REQUIRED:-false}"

      # Admin allowlist — email(s) permitted to access the operator dashboard
      AdminAuth__AllowedEmails__0: "${SUPER_ADMIN_EMAIL:-}"
      
      # Auth
      JwtSettings__SecretKey: "${JWT_SECRET_KEY}"
      # Legacy keys kept for backwards compatibility across services/config readers.
      Auth__JwtKey: "${JWT_SECRET_KEY}"
      JWT__Secret: "${JWT_SECRET_KEY}"
      
      # Object storage (MinIO)
      MinIO__Endpoint: "minio:9000"
      MinIO__AccessKey: "${MINIO_ROOT_USER:-synaptix_minio_user}"
      MinIO__SecretKey: "${MINIO_ROOT_PASSWORD}"
      MinIO__Bucket: "${MINIO_BUCKET:-synaptix-assets}"
      MinIO__UseSSL: "false"
      MinIO__PublicEndpoint: "${MINIO_PUBLIC_ENDPOINT:-localhost:9000}"

      # Schema startup gate — block API until migrations have completed
      SchemaGate__Enabled: "true"
      SchemaGate__StartupGateEnabled: "true"
      SchemaGate__FailStartupIfInvalid: "true"
      SchemaGate__LogOnly: "false"
      SchemaGate__TimeoutSeconds: "120"

      # Observability
      Observability__ServiceName: "Synaptix.Backend.Api"
      Serilog__MinimumLevel: "${LOG_LEVEL:-Information}"
      DataProtection__KeysPath: "${DATA_PROTECTION_KEYS_PATH:-/app/dp-keys}"
      # Durable file-backed sidecar inference store path (mounted volume below).
      SIDECAR_INFERENCE_STORE_PATH: "/var/lib/synaptix-sidecar/inference-store.jsonl"
      # Comma-separated origins allowed by CORS (e.g. for mobile clients calling the API directly)
      Cors__AllowedOrigins__0: "${CORS_ORIGIN_0:-http://localhost:63033}"
      Cors__AllowedOrigins__1: "${CORS_ORIGIN_1:-http://127.0.0.1:63033}"
      Cors__AllowedOrigins__2: "${CORS_ORIGIN_2:-http://localhost:8200}"
      Cors__AllowedOrigins__3: "${CORS_ORIGIN_3:-http://localhost:3000}"
      Cors__AllowedOrigins__4: "${CORS_ORIGIN_4:-http://localhost:8080}"
    volumes:
      # dp-keys intentionally NOT a named volume — named volumes are root:root on creation,
      # which prevents the non-root appuser from writing DP keys. The container's writable
      # layer is already owned by appuser (chown -R in the Dockerfile), so no mount needed.
      - sidecar_inference_data:/var/lib/synaptix-sidecar
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    networks: [synaptix-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ================================
  # Sidecar (FastAPI)
  # ================================
  sidecar:
    build:
      context: ..
      dockerfile: docker/Dockerfile.sidecar
    container_name: synaptix_sidecar
    restart: unless-stopped
    ports:
      - "${SIDECAR_PORT:-8100}:8100"
    environment:
      BACKEND_BASE_URL: "http://backend-api:5000"
      BACKEND_GRPC_URL: "backend-api:5001"
      MONGO_URL: "mongodb://${MONGO_APP_USER:-synaptix_app_user}:${MONGO_APP_PASSWORD}@mongodb:27017/${MONGO_ANALYTICS_DB:-synaptix_analytics}?authSource=${MONGO_AUTH_DB:-synaptix_analytics}"
      MONGO_DB: "${MONGO_ANALYTICS_DB:-synaptix_analytics}"
      ELASTICSEARCH_URL: "http://elasticsearch:9200"
      ELASTICSEARCH_USER: "elastic"
      ELASTICSEARCH_PASSWORD: "${ELASTIC_PASSWORD}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      # Passed through so the config proxy can authenticate against /admin/config
      ADMIN_OPS_KEY: "${ADMIN_OPS_KEY:-CHANGE_ME}"
    depends_on:
      backend-api:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks: [synaptix-net]
    healthcheck:
      # python:3.12-slim has no curl — use Python stdlib instead
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ================================
  # Crypto Settlement Service (Python)
  # ================================
  crypto-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.crypto
    container_name: synaptix_crypto_service
    restart: unless-stopped
    ports:
      - "${CRYPTO_SERVICE_PORT:-8500}:8300"
    environment:
      BACKEND_BASE_URL: "http://backend-api:5000"
      ADMIN_OPS_KEY: "${ADMIN_OPS_KEY:-CHANGE_ME}"
      # Use dedicated crypto-service credentials if available, otherwise fall back to general app user
      MONGO_URL: "${MONGO_CRYPTO_URL:-mongodb://${MONGO_CRYPTO_USER:-${MONGO_APP_USER:-synaptix_app_user}}:${MONGO_CRYPTO_PASSWORD:-${MONGO_APP_PASSWORD:-synaptix_app_password_123}}@mongodb:27017/${MONGO_CRYPTO_DB:-synaptix_crypto}?authSource=${MONGO_AUTH_DB:-synaptix_analytics}}"
      MONGO_DB: "${MONGO_CRYPTO_DB:-synaptix_crypto}"
      CRYPTO_SERVICE_JWT: "${CRYPTO_SERVICE_JWT:-}"
      CRYPTO_SERVICE_JWT_FILE: "${CRYPTO_SERVICE_JWT_FILE:-}"
      REQUIRE_CRYPTO_SERVICE_JWT: "${REQUIRE_CRYPTO_SERVICE_JWT:-false}"
      KMS_API_BASE_URL: "${KMS_API_BASE_URL:-http://kms-api:5050}"
      KMS_SERVICE_TOKEN: "${KMS_SERVICE_TOKEN:-}"
      # Solana (SOL native + SNX SPL token)
      SOLANA_RPC_URL: "${SOLANA_RPC_URL:-https://api.devnet.solana.com}"
      SOLANA_TREASURY_KEYPAIR_PATH: "/run/secrets/solana-treasury"
      SNX_MINT_ADDRESS: "${SNX_MINT_ADDRESS:-}"
      # XRP Ledger
      XRPL_NODE_URL: "${XRPL_NODE_URL:-wss://s.altnet.rippletest.net:51233}"
      XRPL_TREASURY_SEED: "${XRPL_TREASURY_SEED:-}"
      # Ethereum / SHIB (Phase 2 — leave blank to disable)
      ETHEREUM_RPC_URL: "${ETHEREUM_RPC_URL:-}"
      # Settlement worker
      SETTLEMENT_POLL_INTERVAL_SECONDS: "${SETTLEMENT_POLL_INTERVAL:-30}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    volumes:
      # Treasury keypair — NEVER bake into image; mount read-only from host secrets dir
      - "${SOLANA_TREASURY_KEY_PATH:-./secrets/solana-treasury.json}:/run/secrets/solana-treasury:ro"
    depends_on:
      backend-api:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks: [synaptix-net]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8300/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ================================
  # Operator Dashboard (Django) — PRIMARY/AUTHORITATIVE TARGET
  # ================================
  operator-dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard-django
    container_name: synaptix_operator_dashboard
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-8200}:8200"
    environment:
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: "*"
      DJANGO_CSRF_TRUSTED_ORIGINS: "http://localhost:${DASHBOARD_PORT:-8200},http://127.0.0.1:${DASHBOARD_PORT:-8200}"
      DOTNET_API_BASE_URL: "http://backend-api:5000"
      FASTAPI_BASE_URL: "http://sidecar:8100"
      MINIO_BASE_URL: "http://minio:9000"
      INSTALLER_MAX_UPLOAD_BYTES: "${INSTALLER_MAX_UPLOAD_BYTES:-1073741824}"
      INSTALLER_ALLOW_LOCAL_MIGRATION_RUN: "${INSTALLER_ALLOW_LOCAL_MIGRATION_RUN:-false}"
      ADMIN_OPS_KEY: "${ADMIN_OPS_KEY:-CHANGE_ME}"
      ADMIN_AUTH_TRANSPORT: "${ADMIN_AUTH_TRANSPORT:-auto}"
      KMS_API_BASE_URL: "${KMS_API_BASE_URL:-http://kms-api:5050}"
      KMS_SERVICE_TOKEN: "${KMS_SERVICE_TOKEN:-}"
      API_REQUEST_TIMEOUT_SECONDS: "5"
    depends_on:
      backend-api:
        condition: service_healthy
      sidecar:
        condition: service_healthy
    networks: [synaptix-net]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8200/healthz', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ================================
  # Operator Dashboard (React) — Next-gen frontend
  # ================================
  operator-dashboard-react:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard-react
      args:
        VITE_API_BASE_URL: "${REACT_API_BASE_URL:-http://backend-api:5000}"
        VITE_APP_ENV: "${REACT_APP_ENV:-production}"
    container_name: synaptix_operator_dashboard_react
    restart: unless-stopped
    ports:
      - "${REACT_DASHBOARD_PORT:-8300}:8300"
    environment:
      VITE_API_BASE_URL: "${REACT_API_BASE_URL:-http://backend-api:5000}"
      VITE_APP_ENV: "${REACT_APP_ENV:-production}"
    depends_on:
      backend-api:
        condition: service_healthy
    networks: [synaptix-net]
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8300/index.html"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# ================================
# Networks
# ================================
networks:
  synaptix-net:
    name: synaptix-net
    driver: bridge

# ================================
# Volumes
# ================================
volumes:
  postgres_data:
  mongodb_data:
  mongodb_config:
  redis_data:
  elasticsearch_data:
  rabbitmq_data:
  minio_data:
  pgadmin_data:
  prometheus_data:
  grafana_data:
  alertmanager_data:
  sidecar_inference_data:
  django_db_data:
  crypto_settlement_data:
  letsencrypt:
