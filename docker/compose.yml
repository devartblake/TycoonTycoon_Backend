name: synaptix

services:
  # ================================
  # Databases
  # ================================
  postgres:
    image: postgres:16-alpine
    container_name: synaptix_postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-synaptix_db}"
      POSTGRES_USER: "${POSTGRES_USER:-synaptix_user}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-synaptix_password_123}"
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init/postgres:/docker-entrypoint-initdb.d
    networks: [synaptix-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-synaptix_user} -d ${POSTGRES_DB:-synaptix_db}"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:7.0
    container_name: synaptix_mongodb
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: "${MONGO_INITDB_ROOT_USERNAME:-synaptix_admin}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_INITDB_ROOT_PASSWORD:-synaptix_mongo_password_123}"
      MONGO_INITDB_DATABASE: "${MONGO_INITDB_DATABASE:-synaptix_db}"
      MONGO_APP_USER: "${MONGO_APP_USER:-synaptix_app_user}"
      MONGO_APP_PASSWORD: "${MONGO_APP_PASSWORD:-synaptix_app_password_123}"
      MONGO_APP_DB: "${MONGO_APP_DB:-synaptix_db}"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      - ./init/mongo:/docker-entrypoint-initdb.d
    networks: [synaptix-net]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ================================
  # Caching & Search
  # ================================
  redis:
    image: redis:7-alpine
    container_name: synaptix_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass '${REDIS_PASSWORD:-synaptix_redis_password_123}'"]
    volumes:
      - redis_data:/data
    networks: [synaptix-net]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a '${REDIS_PASSWORD:-synaptix_redis_password_123}' ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: synaptix_elasticsearch
    restart: unless-stopped
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.enrollment.enabled=false
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-synaptix_elastic_password_123}
      - ES_JAVA_OPTS=${ES_JAVA_OPTS:--Xms512m -Xmx512m}
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks: [synaptix-net]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -u elastic:${ELASTIC_PASSWORD:-synaptix_elastic_password_123} http://localhost:9200/_cluster/health?pretty >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10

  # ================================
  # Message Queue
  # ================================
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: synaptix_rabbitmq
    restart: unless-stopped
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USER:-synaptix_user}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASSWORD:-synaptix_rabbitmq_password_123}"
      RABBITMQ_DEFAULT_VHOST: "${RABBITMQ_VHOST:-synaptix}"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks: [synaptix-net]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ================================
  # Object Storage
  # ================================
  minio:
    image: minio/minio:latest
    container_name: synaptix_minio
    restart: unless-stopped
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-synaptix_minio_user}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-synaptix_minio_password_123}"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks: [synaptix-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ================================
  # Monitoring (Dev Profile)
  # ================================
  prometheus:
    image: prom/prometheus:latest
    container_name: synaptix_prometheus
    restart: unless-stopped
    profiles: ["dev"]
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks: [synaptix-net]

  grafana:
    image: grafana/grafana:latest
    container_name: synaptix_grafana
    restart: unless-stopped
    profiles: ["dev"]
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-admin_password_123}"
      GF_INSTALL_PLUGINS: "grafana-clock-panel,grafana-simple-json-datasource"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks: [synaptix-net]

  # ================================
  # Admin UIs
  # ================================
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: synaptix_kibana
    restart: unless-stopped
    profiles: ["dev"]
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD:-synaptix_elastic_password_123}
    depends_on:
      - elasticsearch
    networks: [synaptix-net]

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: synaptix_pgadmin
    restart: unless-stopped
    profiles: ["dev"]
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: "${PGADMIN_DEFAULT_EMAIL:-admin@synaptix.app}"
      PGADMIN_DEFAULT_PASSWORD: "${PGADMIN_DEFAULT_PASSWORD:-admin_password_123}"
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks: [synaptix-net]

  mongo-express:
    image: mongo-express:latest
    container_name: synaptix_mongo_express
    restart: unless-stopped
    profiles: ["dev"]
    ports:
      - "${MONGO_EXPRESS_PORT:-8081}:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: "${MONGO_INITDB_ROOT_USERNAME:-synaptix_admin}"
      ME_CONFIG_MONGODB_ADMINPASSWORD: "${MONGO_INITDB_ROOT_PASSWORD:-synaptix_mongo_password_123}"
      ME_CONFIG_MONGODB_URL: "mongodb://${MONGO_INITDB_ROOT_USERNAME:-synaptix_admin}:${MONGO_INITDB_ROOT_PASSWORD:-synaptix_mongo_password_123}@mongodb:27017/"
      ME_CONFIG_BASICAUTH_USERNAME: "${MONGO_EXPRESS_USERNAME:-admin}"
      ME_CONFIG_BASICAUTH_PASSWORD: "${MONGO_EXPRESS_PASSWORD:-admin_password_123}"
    depends_on:
      - mongodb
    networks: [synaptix-net]

  dbgate:
      image: dbgate/dbgate:latest
      container_name: synaptix_dbgate
      restart: unless-stopped
      profiles: ["dev"]
      ports:
        - "${DBGATE_PORT:-3001}:3000"
      environment:
        CONNECTIONS: synaptix_postgres,synaptix_mongodb

        LABEL_synaptix_postgres: "Synaptix PostgreSQL"
        SERVER_synaptix_postgres: postgres
        PORT_synaptix_postgres: 5432
        ENGINE_synaptix_postgres: postgres@dbgate-plugin-postgres
        USER_synaptix_postgres: "${POSTGRES_USER:-synaptix_user}"
        PASSWORD_synaptix_postgres: "${POSTGRES_PASSWORD:-synaptix_password_123}"
        DATABASE_synaptix_postgres: "${POSTGRES_DB:-synaptix_db}"

        LABEL_synaptix_mongodb: "Synaptix MongoDB"
        SERVER_synaptix_mongodb: mongodb
        PORT_synaptix_mongodb: 27017
        ENGINE_synaptix_mongodb: mongo@dbgate-plugin-mongo
        USER_synaptix_mongodb: "${MONGO_INITDB_ROOT_USERNAME:-synaptix_admin}"
        PASSWORD_synaptix_mongodb: "${MONGO_INITDB_ROOT_PASSWORD:-synaptix_mongo_password_123}"
        DATABASE_synaptix_mongodb: "${MONGO_INITDB_DATABASE:-synaptix_db}"
        URL_synaptix_mongodb: "mongodb://${MONGO_INITDB_ROOT_USERNAME:-synaptix_admin}:${MONGO_INITDB_ROOT_PASSWORD:-synaptix_mongo_password_123}@mongodb:27017/${MONGO_INITDB_DATABASE:-synaptix_db}?authSource=admin"
      depends_on:
        - postgres
        - mongodb
      networks: [synaptix-net]

  # ================================
  # Reverse Proxy
  # ================================
  traefik:
    image: traefik:v3.2
    container_name: synaptix_traefik
    restart: unless-stopped
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=synaptix-net"
      - "--entrypoints.web.address=:80"
      - "--log.level=INFO"
    ports:
      - "${TRAEFIK_HTTP_PORT:-80}:80"
      - "${TRAEFIK_DASHBOARD_PORT:-8080}:8080"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - letsencrypt:/letsencrypt
    networks: [synaptix-net]

  # ================================
  # Backend Services
  # ================================
  migration:
    build:
      context: ..
      dockerfile: docker/Dockerfile.migrate
      args:
        - BUILD_CONFIGURATION="${BUILD_CONFIGURATION:-Release}"
    container_name: synaptix_migration
    restart: "no"
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Development}"
      DOTNET_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Development}"
      
      # Database connections
      ConnectionStrings__db: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-synaptix_db};Username=${POSTGRES_USER:-synaptix_user};Password=${POSTGRES_PASSWORD:-synaptix_password_123}"
      ConnectionStrings__redis: "redis:6379,password=${REDIS_PASSWORD:-synaptix_redis_password_123}"
      ConnectionStrings__mongo: "mongodb://${MONGO_APP_USER:-synaptix_app_user}:${MONGO_APP_PASSWORD:-synaptix_app_password_123}@mongodb:27017/${MONGO_APP_DB:-synaptix_db}?authSource=${MONGO_APP_DB:-synaptix_db}"
      ConnectionStrings__elasticsearch: "http://elasticsearch:9200"
      
      # Elasticsearch
      Elastic__Url: "http://elasticsearch:9200"
      Elastic__Username: "elastic"
      Elastic__Password: "${ELASTIC_PASSWORD:-synaptix_elastic_password_123}"
      
      # MongoDB
      MongoSettings__Database: "synaptix_analytics"
      
      # Super admin seed (idempotent — only creates the account if it doesn't exist)
      SuperAdmin__Email: "${SUPER_ADMIN_EMAIL:-}"
      SuperAdmin__Password: "${SUPER_ADMIN_PASSWORD:-}"
      SuperAdmin__Handle: "${SUPER_ADMIN_HANDLE:-superadmin}"

      # Migration settings
      MigrationService__Mode: "${MIGRATION_MODE:-MigrateAndSeed}"
      MigrationService__SeedSource: "${MIGRATION_SEED_SOURCE:-Auto}"
      MigrationService__AllowEnsureCreated: "${MIGRATION_ALLOW_ENSURE_CREATED:-false}"
      MigrationService__ResetDatabase: "${MIGRATION_RESET_DATABASE:-false}"
      MigrationService__AutoRepairOnMissingTables: "${MIGRATION_AUTO_REPAIR_MISSING_TABLES:-true}"
      MigrationService__DashboardReadiness__Enabled: "${MIGRATION_DASHBOARD_READINESS_ENABLED:-true}"
      MigrationService__DashboardReadiness__Strict: "${MIGRATION_DASHBOARD_READINESS_STRICT:-true}"
      MigrationService__RebuildElastic__Enabled: "${REBUILD_ELASTIC:-false}"

      # Seed object keys. The bucket is MinIO__Bucket; do not include the bucket name in these keys.
      MinIO__Bucket: "${MINIO_BUCKET:-synaptix-assets}"
      MinIO__Endpoint: "minio:9000"
      MinIO__AccessKey: "${MINIO_ROOT_USER:-synaptix_minio_user}"
      MinIO__SecretKey: "${MINIO_ROOT_PASSWORD:-synaptix_minio_password_123}"
      MinIO__UseSSL: "false"
      MinIO__Seeds__StoreItemsKey: "${MINIO_SEED_STORE_ITEMS_KEY:-seeds/store-items.json}"
      MinIO__Seeds__SkillNodesKey: "${MINIO_SEED_SKILL_NODES_KEY:-seeds/skill-nodes.json}"
      MinIO__Seeds__SeasonRewardsKey: "${MINIO_SEED_SEASON_REWARDS_KEY:-seeds/season-rewards.json}"
      MinIO__Seeds__QuestionsKey: "${MINIO_SEED_QUESTIONS_KEY:-seeds/questions.json}"
      
      # Observability
      Observability__ServiceName: "Synaptix.MigrationService"
      Serilog__MinimumLevel: "${LOG_LEVEL:-Information}"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks: [synaptix-net]

  backend-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
      args:
        BUILD_CONFIGURATION: "${BUILD_CONFIGURATION:-Release}"
    container_name: synaptix_backend_api
    restart: unless-stopped
    ports:
      - "${BACKEND_HTTP_PORT:-5000}:5000"
      - "${BACKEND_GRPC_PORT:-5001}:5001"   # gRPC / HTTP2 — sidecar only
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Development}"
      ASPNETCORE_URLS: ""   # Kestrel dual-port config in Program.cs overrides this
      
      # Database connections
      ConnectionStrings__db: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-synaptix_db};Username=${POSTGRES_USER:-synaptix_user};Password=${POSTGRES_PASSWORD:-synaptix_password_123}"
      ConnectionStrings__redis: "redis:6379,password=${REDIS_PASSWORD:-synaptix_redis_password_123},defaultDatabase=0"
      ConnectionStrings__mongo: "mongodb://${MONGO_APP_USER:-synaptix_app_user}:${MONGO_APP_PASSWORD:-synaptix_app_password_123}@mongodb:27017/${MONGO_APP_DB:-synaptix_db}?authSource=${MONGO_APP_DB:-synaptix_db}"
      ConnectionStrings__elasticsearch: "http://elastic:${ELASTIC_PASSWORD:-synaptix_elastic_password_123}@elasticsearch:9200"
      
      # Elasticsearch
      Elastic__Url: "http://elasticsearch:9200"
      Elastic__Username: "elastic"
      Elastic__Password: "${ELASTIC_PASSWORD:-synaptix_elastic_password_123}"
      Elastic__DailyWriteAlias: "synaptix-daily-rollups"
      Elastic__PlayerDailyWriteAlias: "synaptix-player-daily-rollups"
      
      # MongoDB
      Mongo__Database: "synaptix_analytics"
      MongoSettings__Database: "synaptix_analytics"
      
      # Hangfire
      Hangfire__Enabled: "${HANGFIRE_ENABLED:-true}"
      Hangfire__DashboardPath: "/hangfire"
      
      # Analytics
      Analytics__Enabled: "${ANALYTICS_ENABLED:-true}"
      
      # Admin Ops
      AdminOps__Enabled: "${ADMIN_OPS_ENABLED:-true}"
      AdminOps__Header: "X-Admin-Ops-Key"
      AdminOps__Key: "${ADMIN_OPS_KEY:-CHANGE_ME}"
      AdminAuth__AllowTrustedBffPlainJson: "${ADMIN_AUTH_ALLOW_TRUSTED_BFF_PLAIN_JSON:-true}"

      # Admin allowlist — email(s) permitted to access the operator dashboard
      AdminAuth__AllowedEmails__0: "${SUPER_ADMIN_EMAIL:-}"
      
      # Auth
      JwtSettings__SecretKey: "${JWT_SECRET_KEY:-your-super-secret-jwt-key-change-me-in-production-minimum-32-characters-long}"
      # Legacy keys kept for backwards compatibility across services/config readers.
      Auth__JwtKey: "${JWT_SECRET_KEY:-your-super-secret-jwt-key-change-me-in-production-minimum-32-characters-long}"
      JWT__Secret: "${JWT_SECRET_KEY:-your-super-secret-jwt-key-change-me-in-production-minimum-32-characters-long}"
      
      # Object storage (MinIO)
      MinIO__Endpoint: "minio:9000"
      MinIO__AccessKey: "${MINIO_ROOT_USER:-synaptix_minio_user}"
      MinIO__SecretKey: "${MINIO_ROOT_PASSWORD:-synaptix_minio_password_123}"
      MinIO__Bucket: "${MINIO_BUCKET:-synaptix-assets}"
      MinIO__UseSSL: "false"
      MinIO__PublicEndpoint: "${MINIO_PUBLIC_ENDPOINT:-localhost:9000}"

      # Schema startup gate — block API until migrations have completed
      SchemaGate__Enabled: "true"
      SchemaGate__StartupGateEnabled: "true"
      SchemaGate__FailStartupIfInvalid: "true"
      SchemaGate__LogOnly: "false"
      SchemaGate__TimeoutSeconds: "120"

      # Observability
      Observability__ServiceName: "Synaptix.Backend.Api"
      Serilog__MinimumLevel: "${LOG_LEVEL:-Information}"
      DataProtection__KeysPath: "${DATA_PROTECTION_KEYS_PATH:-/tmp/synaptix-dpkeys}"
      # Durable file-backed sidecar inference store path (mounted volume below).
      SIDECAR_INFERENCE_STORE_PATH: "/var/lib/synaptix-sidecar/inference-store.jsonl"
      # Comma-separated origins allowed by CORS (e.g. for mobile clients calling the API directly)
      Cors__AllowedOrigins__0: "${CORS_ORIGIN_0:-http://localhost:63033}"
      Cors__AllowedOrigins__1: "${CORS_ORIGIN_1:-http://127.0.0.1:63033}"
      Cors__AllowedOrigins__2: "${CORS_ORIGIN_2:-http://localhost:8200}"
      Cors__AllowedOrigins__3: "${CORS_ORIGIN_3:-http://localhost:3000}"
      Cors__AllowedOrigins__4: "${CORS_ORIGIN_4:-http://localhost:8080}"
    volumes:
      - sidecar_inference_data:/var/lib/synaptix-sidecar
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    networks: [synaptix-net]
    labels:
      - "traefik.enable=true"
      # Route /api/* to the backend; strip the /api prefix before forwarding
      - "traefik.http.routers.backend-api.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.backend-api.entrypoints=web"
      - "traefik.http.routers.backend-api.priority=10"
      - "traefik.http.services.backend-api.loadbalancer.server.port=5000"
      - "traefik.http.middlewares.backend-api-strip.stripprefix.prefixes=/api"
      - "traefik.http.routers.backend-api.middlewares=backend-api-strip"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ================================
  # Sidecar (FastAPI)
  # ================================
  sidecar:
    build:
      context: ..
      dockerfile: docker/Dockerfile.sidecar
    container_name: synaptix_sidecar
    restart: unless-stopped
    ports:
      - "${SIDECAR_PORT:-8100}:8100"
    environment:
      BACKEND_BASE_URL: "http://backend-api:5000"
      BACKEND_GRPC_URL: "backend-api:5001"
      MONGO_URL: "mongodb://${MONGO_APP_USER:-synaptix_app_user}:${MONGO_APP_PASSWORD:-synaptix_app_password_123}@mongodb:27017/${MONGO_APP_DB:-synaptix_db}?authSource=${MONGO_APP_DB:-synaptix_db}"
      MONGO_DB: "${MONGO_APP_DB:-synaptix_analytics}"
      ELASTICSEARCH_URL: "http://elasticsearch:9200"
      ELASTICSEARCH_USER: "elastic"
      ELASTICSEARCH_PASSWORD: "${ELASTIC_PASSWORD:-synaptix_elastic_password_123}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      # Passed through so the config proxy can authenticate against /admin/config
      ADMIN_OPS_KEY: "${ADMIN_OPS_KEY:-CHANGE_ME}"
    depends_on:
      backend-api:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks: [synaptix-net]
    healthcheck:
      # python:3.12-slim has no curl — use Python stdlib instead
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ================================
  # Crypto Settlement Service (Python)
  # ================================
  crypto-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.crypto
    container_name: synaptix_crypto_service
    restart: unless-stopped
    ports:
      - "${CRYPTO_SERVICE_PORT:-8300}:8300"
    environment:
      BACKEND_BASE_URL: "http://backend-api:5000"
      ADMIN_OPS_KEY: "${ADMIN_OPS_KEY:-CHANGE_ME}"
      MONGO_URL: "mongodb://${MONGO_APP_USER:-synaptix_app_user}:${MONGO_APP_PASSWORD:-synaptix_app_password_123}@mongodb:27017/${MONGO_APP_DB:-synaptix_db}?authSource=${MONGO_APP_DB:-synaptix_db}"
      MONGO_DB: "synaptix_crypto"
      # Solana (SOL native + SNX SPL token)
      SOLANA_RPC_URL: "${SOLANA_RPC_URL:-https://api.devnet.solana.com}"
      SOLANA_TREASURY_KEYPAIR_PATH: "/run/secrets/solana-treasury"
      SNX_MINT_ADDRESS: "${SNX_MINT_ADDRESS:-}"
      # XRP Ledger
      XRPL_NODE_URL: "${XRPL_NODE_URL:-wss://s.altnet.rippletest.net:51233}"
      XRPL_TREASURY_SEED: "${XRPL_TREASURY_SEED:-}"
      # Ethereum / SHIB (Phase 2 — leave blank to disable)
      ETHEREUM_RPC_URL: "${ETHEREUM_RPC_URL:-}"
      # Settlement worker
      SETTLEMENT_POLL_INTERVAL_SECONDS: "${SETTLEMENT_POLL_INTERVAL:-30}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    volumes:
      # Treasury keypair — NEVER bake into image; mount read-only from host secrets dir
      - "${SOLANA_TREASURY_KEY_PATH:-./secrets/solana-treasury.json}:/run/secrets/solana-treasury:ro"
    depends_on:
      backend-api:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks: [synaptix-net]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8300/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ================================
  # Operator Dashboard (Django) — PRIMARY/AUTHORITATIVE TARGET
  # ================================
  operator-dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard-django
    container_name: synaptix_operator_dashboard
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-8200}:8200"
    environment:
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: "*"
      DOTNET_API_BASE_URL: "http://backend-api:5000"
      FASTAPI_BASE_URL: "http://sidecar:8100"
      MINIO_BASE_URL: "http://minio:9000"
      ADMIN_OPS_KEY: "${ADMIN_OPS_KEY:-CHANGE_ME}"
      ADMIN_AUTH_TRANSPORT: "${ADMIN_AUTH_TRANSPORT:-auto}"
      KMS_API_BASE_URL: "${KMS_API_BASE_URL:-}"
      KMS_SERVICE_TOKEN: "${KMS_SERVICE_TOKEN:-}"
      API_REQUEST_TIMEOUT_SECONDS: "5"
    depends_on:
      backend-api:
        condition: service_healthy
      sidecar:
        condition: service_healthy
    networks: [synaptix-net]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.operator-dashboard.rule=PathPrefix(`/`)"
      - "traefik.http.routers.operator-dashboard.entrypoints=web"
      - "traefik.http.routers.operator-dashboard.priority=1"
      - "traefik.http.services.operator-dashboard.loadbalancer.server.port=8200"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8200/healthz', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ================================
  # Operator Dashboard (Blazor Server) — legacy, for comparison
  # ================================
  operator-dashboard-blazor:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard
    container_name: synaptix_operator_dashboard_blazor
    restart: unless-stopped
    ports:
      - "${DASHBOARD_BLAZOR_PORT:-8201}:8200"
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Development}"
      # Align with ASP.NET 9 container defaults to avoid startup warning:
      # "Overriding HTTP_PORTS '8080' ... Binding to values defined by URLS ..."
      HTTP_PORTS: "8200"
      # Override appsettings.Development.json (which points to localhost:5100 for standalone dev).
      # In Docker, "localhost" resolves to the container itself — use the service name instead.
      ApiBaseUrl: "http://backend-api:5000"
      AdminOps__Key: "${ADMIN_OPS_KEY:-CHANGE_ME}"
      DataProtection__KeysPath: "/app/dp-keys"
    volumes:
      - blazor_dp_keys:/app/dp-keys
    depends_on:
      backend-api:
        condition: service_healthy
    networks: [synaptix-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8200"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

# ================================
# Networks
# ================================
networks:
  synaptix-net:
    driver: bridge

# ================================
# Volumes
# ================================
volumes:
  postgres_data:
  mongodb_data:
  mongodb_config:
  redis_data:
  elasticsearch_data:
  rabbitmq_data:
  minio_data:
  pgadmin_data:
  prometheus_data:
  grafana_data:
  dashboard_dp_keys:
  # Back-compat alias for older compose service variants that still reference
  # `blazor_dp_keys` (for example `operator-dashboard-blazor`).
  blazor_dp_keys:
  sidecar_inference_data:
  django_db_data:
  crypto_settlement_data:
  letsencrypt:
