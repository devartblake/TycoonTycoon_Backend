http:
  routers:
    backend-api:
      # The backend serves the public API under /api/v1 (see Program.cs).
      # Pass the path through unchanged — do NOT strip /api — so it matches
      # the prod compose.prod.yml Host-router topology, which also forwards
      # the path unmodified. Stripping here would 404 every /api/v1 route.
      rule: "PathPrefix(`/api`)"
      entryPoints: [web]
      priority: 10
      service: backend-api

    operator-dashboard:
      rule: "PathPrefix(`/`)"
      entryPoints: [web]
      priority: 1
      service: operator-dashboard

  services:
    backend-api:
      loadBalancer:
        servers:
          - url: "http://backend-api:5000"

    operator-dashboard:
      loadBalancer:
        servers:
          - url: "http://operator-dashboard:8200"
