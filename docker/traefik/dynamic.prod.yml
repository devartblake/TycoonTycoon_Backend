# Production file-provider routing.
#
# The single-Linode production Compose override mounts this file instead of
# using the Docker provider. That avoids Docker API-version compatibility
# issues and keeps the Docker socket out of the Traefik container.
#
# TLS is served using the Cloudflare Origin Certificate mounted at /certs/.
# Cloudflare SSL/TLS mode must be set to "Full (Strict)" in the Cloudflare
# dashboard — the origin cert is only trusted by Cloudflare's edge, not by
# browsers directly.

http:
  routers:
    backend-api:
      rule: "Host(`api.synaptixplay.com`)"
      entryPoints: [websecure]
      service: backend-api
      tls: {}

    prometheus:
      rule: "Host(`monitoring.synaptixplay.com`) && PathPrefix(`/prometheus`)"
      entryPoints: [websecure]
      service: prometheus
      middlewares: [prometheus-strip, auth-basic]
      tls: {}

    grafana:
      rule: "Host(`monitoring.synaptixplay.com`) && PathPrefix(`/grafana`)"
      entryPoints: [websecure]
      service: grafana
      middlewares: [grafana-strip, auth-basic]
      tls: {}

    alertmanager:
      rule: "Host(`monitoring.synaptixplay.com`) && PathPrefix(`/alertmanager`)"
      entryPoints: [websecure]
      service: alertmanager
      middlewares: [alertmanager-strip, auth-basic]
      tls: {}

    operator-dashboard:
      rule: "Host(`admin.synaptixplay.com`)"
      entryPoints: [websecure]
      service: operator-dashboard
      tls: {}

    flutter-web:
      rule: "Host(`app.synaptixplay.com`)"
      entryPoints: [websecure]
      service: flutter-web
      tls: {}

  middlewares:
    prometheus-strip:
      stripPrefix:
        prefixes:
          - /prometheus

    grafana-strip:
      stripPrefix:
        prefixes:
          - /grafana

    alertmanager-strip:
      stripPrefix:
        prefixes:
          - /alertmanager

    auth-basic:
      basicAuth:
        users:
          - "admin:$2y$05$zWwWWWWWWWWWWWWWWWWW.XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"

  services:
    backend-api:
      loadBalancer:
        servers:
          - url: "http://backend-api:5000"

    prometheus:
      loadBalancer:
        servers:
          - url: "http://prometheus:9090"

    grafana:
      loadBalancer:
        servers:
          - url: "http://grafana:3000"

    alertmanager:
      loadBalancer:
        servers:
          - url: "http://alertmanager:9093"

    operator-dashboard:
      loadBalancer:
        servers:
          - url: "http://operator-dashboard:8200"

    flutter-web:
      loadBalancer:
        servers:
          - url: "http://flutter-web:80"

tls:
  certificates:
    - certFile: /certs/origin.crt
      keyFile: /certs/origin.key
  stores:
    default:
      defaultCertificate:
        certFile: /certs/origin.crt
        keyFile: /certs/origin.key
