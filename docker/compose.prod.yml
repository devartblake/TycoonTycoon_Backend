# Production overrides for a single-Linode deployment.
#
# Assumptions:
# - DNS A/AAAA records point api.synaptixplay.com and admin.synaptixplay.com to the Linode.
# - Traefik is the only public ingress: host ports 80 and 443.
# - Service ports are internal-only.
# - Runtime object storage is Linode Object Storage via the existing MinIO/S3-compatible config keys.
# - Crypto settlement and the legacy Blazor dashboard are disabled for Alpha.

services:
  traefik:
    command: !override
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=synaptix-net"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.le.acme.email=${ACME_EMAIL:?ACME_EMAIL is required in prod}"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.le.acme.tlschallenge=true"
      - "--log.level=WARN"
      - "--accesslog=true"
    ports: !override
      - "80:80"
      - "443:443"
    volumes: !override
      - letsencrypt:/letsencrypt
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend-api:
    ports: !override []
    environment: !override
      ASPNETCORE_ENVIRONMENT: "Production"
      DOTNET_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: ""
      ConnectionStrings__db: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-synaptix_db};Username=${POSTGRES_USER:-synaptix_user};Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__redis: "redis:6379,password=${REDIS_PASSWORD:?REDIS_PASSWORD is required in prod},defaultDatabase=0"
      ConnectionStrings__mongo: "mongodb://${MONGO_APP_USER:-synaptix_app_user}:${MONGO_APP_PASSWORD:?MONGO_APP_PASSWORD is required in prod}@mongodb:27017/${MONGO_ANALYTICS_DB:-synaptix_analytics}?authSource=${MONGO_AUTH_DB:-synaptix_analytics}"
      ConnectionStrings__elasticsearch: "http://elastic:${ELASTIC_PASSWORD:?ELASTIC_PASSWORD is required in prod}@elasticsearch:9200"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Port: "5672"
      Elastic__Url: "http://elasticsearch:9200"
      Elastic__Username: "elastic"
      Elastic__Password: "${ELASTIC_PASSWORD:?ELASTIC_PASSWORD is required in prod}"
      Elastic__DailyWriteAlias: "synaptix-daily-rollups-write"
      Elastic__PlayerDailyWriteAlias: "synaptix-player-daily-rollups-write"
      Elastic__SkipCertificateValidation: "${ELASTIC_SKIP_CERT_VALIDATION:-false}"
      Mongo__Database: "${MONGO_ANALYTICS_DB:-synaptix_analytics}"
      MongoSettings__Database: "${MONGO_ANALYTICS_DB:-synaptix_analytics}"
      Hangfire__Enabled: "${HANGFIRE_ENABLED:-true}"
      Hangfire__DashboardPath: "/hangfire"
      Analytics__Enabled: "${ANALYTICS_ENABLED:-true}"
      AdminOps__Enabled: "${ADMIN_OPS_ENABLED:-true}"
      AdminOps__Header: "X-Admin-Ops-Key"
      AdminOps__Key: "${ADMIN_OPS_KEY:?ADMIN_OPS_KEY is required in prod}"
      AdminAuth__AllowTrustedBffPlainJson: "false"
      AdminAuth__AllowedEmails__0: "${SUPER_ADMIN_EMAIL:-}"
      KmsClient__BaseUrl: "http://kms-api:5050"
      KmsClient__ServiceToken: "${KMS_SERVICE_TOKEN:?KMS_SERVICE_TOKEN is required in prod}"
      KmsClient__Required: "true"
      ComplianceClient__BaseUrl: "${COMPLIANCE_API_BASE_URL:-http://compliance-api:5070}"
      ComplianceClient__ServiceToken: "${COMPLIANCE_SERVICE_TOKEN:-}"
      ComplianceClient__Required: "${COMPLIANCE_CLIENT_REQUIRED:-false}"
      JwtSettings__SecretKey: "${JWT_SECRET_KEY:?JWT_SECRET_KEY is required in prod}"
      Auth__JwtKey: "${JWT_SECRET_KEY:?JWT_SECRET_KEY is required in prod}"
      JWT__Secret: "${JWT_SECRET_KEY:?JWT_SECRET_KEY is required in prod}"
      Realtime__RequireRedis: "true"
      ForwardedHeaders__ForwardLimit: "1"
      MinIO__Endpoint: "${LINODE_OBJECT_STORAGE_ENDPOINT:?LINODE_OBJECT_STORAGE_ENDPOINT is required in prod}"
      MinIO__AccessKey: "${LINODE_OBJECT_STORAGE_ACCESS_KEY:?LINODE_OBJECT_STORAGE_ACCESS_KEY is required in prod}"
      MinIO__SecretKey: "${LINODE_OBJECT_STORAGE_SECRET_KEY:?LINODE_OBJECT_STORAGE_SECRET_KEY is required in prod}"
      MinIO__Bucket: "${LINODE_OBJECT_STORAGE_BUCKET:-tt-assets-prod}"
      MinIO__UseSSL: "true"
      MinIO__PublicEndpoint: "${LINODE_OBJECT_STORAGE_PUBLIC_ENDPOINT:?LINODE_OBJECT_STORAGE_PUBLIC_ENDPOINT is required in prod}"
      Assets__RemoteDeliveryEnabled: "true"
      Assets__ManifestUrl: "/api/v1/assets/manifest"
      SchemaGate__Enabled: "true"
      SchemaGate__StartupGateEnabled: "true"
      SchemaGate__FailStartupIfInvalid: "true"
      SchemaGate__LogOnly: "false"
      SchemaGate__TimeoutSeconds: "120"
      Observability__ServiceName: "Synaptix.Backend.Api"
      Serilog__MinimumLevel: "${LOG_LEVEL:-Warning}"
      DataProtection__KeysPath: "${DATA_PROTECTION_KEYS_PATH:-/app/dp-keys}"
      SIDECAR_INFERENCE_STORE_PATH: "/var/lib/synaptix-sidecar/inference-store.jsonl"
      Cors__AllowedOrigins__0: "https://synaptixplay.com"
      Cors__AllowedOrigins__1: "https://www.synaptixplay.com"
      Cors__AllowedOrigins__2: "https://app.synaptixplay.com"
      Cors__AllowedOrigins__3: "https://admin.synaptixplay.com"
      Cors__AllowedOrigins__4: ""
    depends_on: !override
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      kms-api:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend-api.rule=Host(`api.${DOMAIN:?DOMAIN is required in prod}`)"
      - "traefik.http.routers.backend-api.entrypoints=websecure"
      - "traefik.http.routers.backend-api.tls.certresolver=le"
      - "traefik.http.services.backend-api.loadbalancer.server.port=5000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  setup:
    environment: !override
      ASPNETCORE_ENVIRONMENT: "Production"
      DOTNET_ENVIRONMENT: "Production"
      ConnectionStrings__db: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-synaptix_db};Username=${POSTGRES_USER:-synaptix_user};Password=${POSTGRES_PASSWORD}"
      MONGO_HOST: "mongodb"
      MONGO_PORT: "27017"
      MONGO_INITDB_ROOT_USERNAME: "${MONGO_INITDB_ROOT_USERNAME:-synaptix_admin}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_INITDB_ROOT_PASSWORD:?MONGO_INITDB_ROOT_PASSWORD is required in prod}"
      MONGO_APP_USER: "${MONGO_APP_USER:-synaptix_app_user}"
      MONGO_APP_PASSWORD: "${MONGO_APP_PASSWORD:?MONGO_APP_PASSWORD is required in prod}"
      MONGO_AUTH_DB: "${MONGO_AUTH_DB:-synaptix_analytics}"
      MONGO_ANALYTICS_DB: "${MONGO_ANALYTICS_DB:-synaptix_analytics}"
      MONGO_CRYPTO_DB: "${MONGO_CRYPTO_DB:-synaptix_crypto}"
      Setup__Mongo__RemoveLegacyAdminAppUser: "${SETUP_MONGO_REMOVE_LEGACY_ADMIN_APP_USER:-false}"
      REDIS_PASSWORD: "${REDIS_PASSWORD:?REDIS_PASSWORD is required in prod}"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      ConnectionStrings__elasticsearch: "http://elasticsearch:9200"
      Elastic__Url: "http://elasticsearch:9200"
      Elastic__Username: "elastic"
      Elastic__Password: "${ELASTIC_PASSWORD:?ELASTIC_PASSWORD is required in prod}"
      ELASTIC_PASSWORD: "${ELASTIC_PASSWORD:?ELASTIC_PASSWORD is required in prod}"
      MinIO__Endpoint: "${LINODE_OBJECT_STORAGE_ENDPOINT:?LINODE_OBJECT_STORAGE_ENDPOINT is required in prod}"
      MinIO__AccessKey: "${LINODE_OBJECT_STORAGE_ACCESS_KEY:?LINODE_OBJECT_STORAGE_ACCESS_KEY is required in prod}"
      MinIO__SecretKey: "${LINODE_OBJECT_STORAGE_SECRET_KEY:?LINODE_OBJECT_STORAGE_SECRET_KEY is required in prod}"
      MinIO__Bucket: "${LINODE_OBJECT_STORAGE_BUCKET:-tt-assets-prod}"
      MinIO__UseSSL: "true"
      MINIO_ROOT_USER: "${LINODE_OBJECT_STORAGE_ACCESS_KEY:?LINODE_OBJECT_STORAGE_ACCESS_KEY is required in prod}"
      MINIO_ROOT_PASSWORD: "${LINODE_OBJECT_STORAGE_SECRET_KEY:?LINODE_OBJECT_STORAGE_SECRET_KEY is required in prod}"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Port: "${RABBITMQ_PORT:-5672}"
      RabbitMQ__User: "${RABBITMQ_USER:-synaptix_user}"
      RabbitMQ__Password: "${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required in prod}"
      RabbitMQ__Vhost: "${RABBITMQ_VHOST:-synaptix}"
      RabbitMQ__ManagementPort: "${RABBITMQ_MANAGEMENT_PORT:-15672}"
      SuperAdmin__Email: "${SUPER_ADMIN_EMAIL:-}"
      SuperAdmin__Password: "${SUPER_ADMIN_PASSWORD:-}"
      SuperAdmin__Handle: "${SUPER_ADMIN_HANDLE:-superadmin}"
      Setup__Command: "provision-services"
      Setup__SeedsSourcePath: "/app/seeds"
      Serilog__MinimumLevel: "${LOG_LEVEL:-Warning}"
    depends_on: !override
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  migration:
    environment: !override
      ASPNETCORE_ENVIRONMENT: "Production"
      DOTNET_ENVIRONMENT: "Production"
      ConnectionStrings__db: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-synaptix_db};Username=${POSTGRES_USER:-synaptix_user};Password=${POSTGRES_PASSWORD}"
      ConnectionStrings__redis: "redis:6379,password=${REDIS_PASSWORD:?REDIS_PASSWORD is required in prod}"
      ConnectionStrings__mongo: "mongodb://${MONGO_APP_USER:-synaptix_app_user}:${MONGO_APP_PASSWORD:?MONGO_APP_PASSWORD is required in prod}@mongodb:27017/${MONGO_ANALYTICS_DB:-synaptix_analytics}?authSource=${MONGO_AUTH_DB:-synaptix_analytics}"
      ConnectionStrings__elasticsearch: "http://elasticsearch:9200"
      Elastic__Url: "http://elasticsearch:9200"
      Elastic__Username: "elastic"
      Elastic__Password: "${ELASTIC_PASSWORD:?ELASTIC_PASSWORD is required in prod}"
      MongoSettings__Database: "${MONGO_ANALYTICS_DB:-synaptix_analytics}"
      SuperAdmin__Email: "${SUPER_ADMIN_EMAIL:-}"
      SuperAdmin__Password: "${SUPER_ADMIN_PASSWORD:-}"
      SuperAdmin__Handle: "${SUPER_ADMIN_HANDLE:-superadmin}"
      MigrationService__Mode: "${MIGRATION_MODE:-MigrateAndSeed}"
      MigrationService__SeedSource: "${MIGRATION_SEED_SOURCE:-Auto}"
      MigrationService__AllowEnsureCreated: "${MIGRATION_ALLOW_ENSURE_CREATED:-false}"
      MigrationService__ResetDatabase: "${MIGRATION_RESET_DATABASE:-false}"
      MigrationService__AutoRepairOnMissingTables: "${MIGRATION_AUTO_REPAIR_MISSING_TABLES:-true}"
      MigrationService__DashboardReadiness__Enabled: "${MIGRATION_DASHBOARD_READINESS_ENABLED:-true}"
      MigrationService__DashboardReadiness__Strict: "${MIGRATION_DASHBOARD_READINESS_STRICT:-true}"
      MigrationService__RebuildElastic__Enabled: "${REBUILD_ELASTIC:-false}"
      MinIO__Bucket: "${LINODE_OBJECT_STORAGE_BUCKET:-tt-assets-prod}"
      MinIO__Endpoint: "${LINODE_OBJECT_STORAGE_ENDPOINT:?LINODE_OBJECT_STORAGE_ENDPOINT is required in prod}"
      MinIO__AccessKey: "${LINODE_OBJECT_STORAGE_ACCESS_KEY:?LINODE_OBJECT_STORAGE_ACCESS_KEY is required in prod}"
      MinIO__SecretKey: "${LINODE_OBJECT_STORAGE_SECRET_KEY:?LINODE_OBJECT_STORAGE_SECRET_KEY is required in prod}"
      MinIO__UseSSL: "true"
      Observability__ServiceName: "Synaptix.MigrationService"
      Serilog__MinimumLevel: "${LOG_LEVEL:-Warning}"
    depends_on: !override
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      setup:
        condition: service_completed_successfully
    restart: "no"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  operator-dashboard:
    ports: !override []
    environment: !override
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: "admin.synaptixplay.com"
      DOTNET_API_BASE_URL: "http://backend-api:5000"
      FASTAPI_BASE_URL: "http://sidecar:8100"
      MINIO_BASE_URL: "https://${LINODE_OBJECT_STORAGE_PUBLIC_ENDPOINT:?LINODE_OBJECT_STORAGE_PUBLIC_ENDPOINT is required in prod}"
      INSTALLER_MAX_UPLOAD_BYTES: "${INSTALLER_MAX_UPLOAD_BYTES:-1073741824}"
      INSTALLER_ALLOW_LOCAL_MIGRATION_RUN: "${INSTALLER_ALLOW_LOCAL_MIGRATION_RUN:-false}"
      ADMIN_OPS_KEY: "${ADMIN_OPS_KEY:?ADMIN_OPS_KEY is required in prod}"
      ADMIN_AUTH_TRANSPORT: "${ADMIN_AUTH_TRANSPORT:-secure-channel}"
      KMS_API_BASE_URL: "http://kms-api:5050"
      KMS_SERVICE_TOKEN: "${KMS_SERVICE_TOKEN:?KMS_SERVICE_TOKEN is required in prod}"
      API_REQUEST_TIMEOUT_SECONDS: "10"
    depends_on: !override
      backend-api:
        condition: service_healthy
      sidecar:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.operator-dashboard.rule=Host(`admin.${DOMAIN:?DOMAIN is required in prod}`)"
      - "traefik.http.routers.operator-dashboard.entrypoints=websecure"
      - "traefik.http.routers.operator-dashboard.tls.certresolver=le"
      - "traefik.http.services.operator-dashboard.loadbalancer.server.port=8200"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  sidecar:
    ports: !override []

  operator-dashboard-blazor:
    ports: !override []
    profiles: ["disabled"]

  postgres:
    ports: !override []
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required in prod}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  mongodb:
    ports: !override []
    environment:
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_INITDB_ROOT_PASSWORD:?MONGO_INITDB_ROOT_PASSWORD is required in prod}"
      MONGO_APP_PASSWORD: "${MONGO_APP_PASSWORD:?MONGO_APP_PASSWORD is required in prod}"
      MONGO_AUTH_DB: "${MONGO_AUTH_DB:-synaptix_analytics}"
      MONGO_ANALYTICS_DB: "${MONGO_ANALYTICS_DB:-synaptix_analytics}"
      MONGO_CRYPTO_DB: "${MONGO_CRYPTO_DB:-synaptix_crypto}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    ports: !override []
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  elasticsearch:
    ports: !override []
    environment:
      ELASTIC_PASSWORD: "${ELASTIC_PASSWORD:?ELASTIC_PASSWORD is required in prod}"
      ES_JAVA_OPTS: "${ES_JAVA_OPTS:--Xms1g -Xmx1g}"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  rabbitmq:
    ports: !override []
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  minio:
    ports: !override []
    profiles: ["disabled"]
    environment:
      MINIO_ROOT_USER: "${LINODE_OBJECT_STORAGE_ACCESS_KEY:-disabled}"
      MINIO_ROOT_PASSWORD: "${LINODE_OBJECT_STORAGE_SECRET_KEY:-disabled}"

  kibana:
    ports: !override []
    profiles: ["disabled"]

  pgadmin:
    ports: !override []
    profiles: ["disabled"]

  mongo-express:
    ports: !override []
    profiles: ["disabled"]

  prometheus:
    ports: !override []
    profiles: ["disabled"]

  grafana:
    ports: !override []
    profiles: ["disabled"]

  dbgate:
    ports: !override []
    profiles: ["disabled"]

  crypto-service:
    ports: !override []
    profiles: ["disabled"]
    environment:
      CRYPTO_SERVICE_JWT: "${CRYPTO_SERVICE_JWT:-}"
      CRYPTO_SERVICE_JWT_FILE: "${CRYPTO_SERVICE_JWT_FILE:-}"
      REQUIRE_CRYPTO_SERVICE_JWT: "true"
      KMS_API_BASE_URL: "http://kms-api:5050"
      KMS_SERVICE_TOKEN: "${KMS_SERVICE_TOKEN:?KMS_SERVICE_TOKEN is required in prod}"

  vault:
    image: hashicorp/vault:1.17
    container_name: synaptix_vault
    restart: unless-stopped
    ports: !override []
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_ADDR: "http://127.0.0.1:8200"
      VAULT_LOCAL_CONFIG: >
        {"storage":{"file":{"path":"/vault/file"}},"listener":[{"tcp":{"address":"0.0.0.0:8200","tls_disable":true}}],"api_addr":"http://vault:8200","disable_mlock":true,"ui":false}
    command: server
    volumes:
      - vault_data:/vault/file
    networks: [synaptix-net]

  kms-api:
    build:
      context: ..
      dockerfile: Synaptix.Security.Kms.Api/Dockerfile
      args:
        BUILD_CONFIGURATION: "${BUILD_CONFIGURATION:-Release}"
    image: synaptix-kms-api:latest
    container_name: synaptix_kms_api
    restart: unless-stopped
    ports: !override []
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      DOTNET_ENVIRONMENT: "Production"
      KmsApi__ServiceToken: "${KMS_SERVICE_TOKEN:?KMS_SERVICE_TOKEN is required in prod}"
      JwtSettings__SecretKey: "${JWT_SECRET_KEY:?JWT_SECRET_KEY is required in prod}"
      Vault__Address: "http://vault:8200"
      Vault__Token: "${VAULT_TOKEN:?VAULT_TOKEN is required in prod}"
      Vault__TransitMount: "${VAULT_TRANSIT_MOUNT:-transit}"
      Vault__SessionWrapKey: "${VAULT_SESSION_WRAP_KEY:-synaptix-session-wrap}"
      Vault__PayloadWrapKey: "${VAULT_PAYLOAD_WRAP_KEY:-synaptix-payload-wrap}"
      Vault__Required: "true"
      ConnectionStrings__cache: "redis:6379,password=${REDIS_PASSWORD:?REDIS_PASSWORD is required in prod},defaultDatabase=1"
      Serilog__MinimumLevel__Default: "${LOG_LEVEL:-Warning}"
    depends_on:
      redis:
        condition: service_healthy
      vault:
        condition: service_started
    networks: [synaptix-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  letsencrypt:
  vault_data:
