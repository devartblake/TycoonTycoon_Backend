# Production overrides:
# - No dev UIs
# - All traffic enters through Traefik (ports 80 + 443); individual services not exposed to host
# - Automatic HTTPS via Let's Encrypt (set DOMAIN and ACME_EMAIL in .env)
# - Tighter defaults for resources and logging

services:
  # --------------------------------
  # Traefik — production HTTPS mode
  # --------------------------------
  traefik:
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=synaptix-net"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.le.acme.email=${ACME_EMAIL:?ACME_EMAIL is required in prod}"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.le.acme.tlschallenge=true"
      - "--log.level=WARN"
    ports:
      - "80:80"
      - "443:443"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # backend-api — no direct port exposure in prod; route through Traefik with HTTPS labels
  backend-api:
    ports: []
    environment:
      AdminAuth__AllowTrustedBffPlainJson: "false"
      KmsClient__BaseUrl: "${KMS_API_BASE_URL:?KMS_API_BASE_URL is required in prod}"
      KmsClient__ServiceToken: "${KMS_SERVICE_TOKEN:?KMS_SERVICE_TOKEN is required in prod}"
      KmsClient__Required: "true"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend-api.rule=Host(`api.${DOMAIN:?DOMAIN is required in prod}`)"
      - "traefik.http.routers.backend-api.entrypoints=websecure"
      - "traefik.http.routers.backend-api.tls.certresolver=le"
      - "traefik.http.services.backend-api.loadbalancer.server.port=5000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # operator-dashboard — no direct port exposure in prod; route through Traefik with HTTPS labels
  operator-dashboard:
    ports: []
    environment:
      DJANGO_DEBUG: "false"
      MINIO_BASE_URL: "http://minio:9000"
      ADMIN_OPS_KEY: "${ADMIN_OPS_KEY:?ADMIN_OPS_KEY is required in prod}"
      ADMIN_AUTH_TRANSPORT: "${ADMIN_AUTH_TRANSPORT:-secure-channel}"
      KMS_API_BASE_URL: "${KMS_API_BASE_URL:?KMS_API_BASE_URL is required in prod}"
      KMS_SERVICE_TOKEN: "${KMS_SERVICE_TOKEN:?KMS_SERVICE_TOKEN is required in prod}"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.operator-dashboard.rule=Host(`${DOMAIN:?DOMAIN is required in prod}`)"
      - "traefik.http.routers.operator-dashboard.entrypoints=websecure"
      - "traefik.http.routers.operator-dashboard.tls.certresolver=le"
      - "traefik.http.services.operator-dashboard.loadbalancer.server.port=8200"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  postgres:
    # In prod, avoid exposing DB to the host unless required
    ports: []
    environment:
      # Example: enforce stronger defaults if not provided
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required in prod}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  mongodb:
    ports: []
    environment:
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_INITDB_ROOT_PASSWORD:?MONGO_INITDB_ROOT_PASSWORD is required in prod}"
      MONGO_APP_PASSWORD: "${MONGO_APP_PASSWORD:?MONGO_APP_PASSWORD is required in prod}"
      MONGO_AUTH_DB: "${MONGO_AUTH_DB:-synaptix_analytics}"
      MONGO_ANALYTICS_DB: "${MONGO_ANALYTICS_DB:-synaptix_analytics}"
      MONGO_CRYPTO_DB: "${MONGO_CRYPTO_DB:-synaptix_crypto}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    ports: []
    # In prod, require explicit password (already enforced in command)
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  elasticsearch:
    ports: []
    environment:
      ELASTIC_PASSWORD: "${ELASTIC_PASSWORD:?ELASTIC_PASSWORD is required in prod}"
      # A conservative default; tune based on your host
      ES_JAVA_OPTS: "${ES_JAVA_OPTS:--Xms1g -Xmx1g}"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  rabbitmq:
    ports: []
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  minio:
    ports: []
    environment:
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required in prod}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # Explicitly disable dev-only tools in prod
  kibana:
    profiles: ["disabled"]

  pgadmin:
    profiles: ["disabled"]

  mongo-express:
    profiles: ["disabled"]

  prometheus:
    profiles: ["disabled"]

  grafana:
    profiles: ["disabled"]

  # Migrations should be an explicit step in prod (run once per deploy)
  migration:
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Production}"
    restart: "no"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  crypto-service:
    environment:
      CRYPTO_SERVICE_JWT: "${CRYPTO_SERVICE_JWT:-}"
      CRYPTO_SERVICE_JWT_FILE: "${CRYPTO_SERVICE_JWT_FILE:-}"
      REQUIRE_CRYPTO_SERVICE_JWT: "true"
      KMS_API_BASE_URL: "${KMS_API_BASE_URL:?KMS_API_BASE_URL is required in prod}"
      KMS_SERVICE_TOKEN: "${KMS_SERVICE_TOKEN:?KMS_SERVICE_TOKEN is required in prod}"
