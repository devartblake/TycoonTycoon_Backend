# Ruff configuration for the operator dashboard.
#
# The CI installs ruff unpinned (`pip install ruff`), and ruff 0.16.0 widened its
# default rule set, which silently turned this lint red on a project that had not
# changed. Pin the rule selection here so the lint is deterministic across ruff
# versions: ruff's classic default (pyflakes + a focused pycodestyle subset) plus
# import sorting. Opinionated/preview style rules are intentionally not selected —
# this dashboard is being retired in favor of the React operator dashboard.
target-version = "py312"
line-length = 88

[lint]
select = ["E4", "E7", "E9", "F", "I"]
