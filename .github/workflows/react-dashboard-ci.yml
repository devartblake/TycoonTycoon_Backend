name: React Dashboard CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'Synaptix.OperatorDashboard.React/**'
      - '.github/workflows/react-dashboard-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'Synaptix.OperatorDashboard.React/**'

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: 'Synaptix.OperatorDashboard.React/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: Synaptix.OperatorDashboard.React

      - name: Type check
        run: npm run type-check
        working-directory: Synaptix.OperatorDashboard.React

      - name: Lint
        run: npm run lint
        working-directory: Synaptix.OperatorDashboard.React

      - name: Build
        run: npm run build
        working-directory: Synaptix.OperatorDashboard.React
        env:
          VITE_ENV: production
          VITE_API_BASE_URL: https://api.example.com

      - name: Unit tests
        run: npm run test:unit
        working-directory: Synaptix.OperatorDashboard.React

      - name: Unit test coverage
        run: npm run test:unit:coverage
        working-directory: Synaptix.OperatorDashboard.React

      - name: Install Playwright
        run: npx playwright install --with-deps
        working-directory: Synaptix.OperatorDashboard.React

      - name: Run E2E tests
        run: npm run test:e2e
        working-directory: Synaptix.OperatorDashboard.React

      - name: Upload E2E report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: Synaptix.OperatorDashboard.React/playwright-report/
          retention-days: 30

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: Synaptix.OperatorDashboard.React/coverage/
          retention-days: 30

  build-docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.dashboard-react-optimized
          tags: synaptix-operator-dashboard:${{ github.sha }}
          outputs: type=docker,dest=/tmp/dashboard-image.tar
          build-args: |
            VITE_ENV=staging
            VITE_API_BASE_URL=${{ secrets.STAGING_API_URL }}

      - name: Load Docker image
        run: docker load --input /tmp/dashboard-image.tar

      - name: Scan image
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy image --severity HIGH,CRITICAL \
            synaptix-operator-dashboard:${{ github.sha }} || true

  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          # Add your staging deployment commands here
          # Example: kubectl apply -f k8s/staging/
        env:
          DEPLOY_KEY: ${{ secrets.STAGING_DEPLOY_KEY }}

  deploy-production:
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: https://admin.synaptixplay.com

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Deploying to production environment..."
          # Add your production deployment commands here
          # Example: kubectl apply -f k8s/production/
        env:
          DEPLOY_KEY: ${{ secrets.PRODUCTION_DEPLOY_KEY }}

      - name: Notify deployment
        if: success()
        run: |
          echo "✅ Deployment successful!"
          # Add notification (Slack, email, etc.)
