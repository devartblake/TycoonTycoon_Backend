name: compose-smoke

# Validates operator login and core BFF flows against the full compose stack.
# Runs automatically on every push to main/master and can be triggered manually.
on:
  workflow_dispatch:
    inputs:
      keep_stack:
        description: 'Keep the compose stack running after the test (useful for debugging)'
        required: false
        default: 'false'
  push:
    branches: [ main, master ]

jobs:
  compose-smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      SMOKE_ADMIN_EMAIL: smoke-admin@synaptix.local
      SMOKE_ADMIN_PASSWORD: SmokeTest123!
      KEEP_STACK: ${{ github.event.inputs.keep_stack || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start compose stack (with smoke overrides)
        run: |
          docker compose -f docker/compose.yml -f docker/compose.smoke.yml up -d --build
        env:
          SMOKE_ADMIN_EMAIL: ${{ env.SMOKE_ADMIN_EMAIL }}
          SMOKE_ADMIN_PASSWORD: ${{ env.SMOKE_ADMIN_PASSWORD }}

      - name: Run compose smoke tests
        run: |
          chmod +x scripts/compose-smoke.sh
          STACK_RUNNING=true bash scripts/compose-smoke.sh
        env:
          SMOKE_ADMIN_EMAIL: ${{ env.SMOKE_ADMIN_EMAIL }}
          SMOKE_ADMIN_PASSWORD: ${{ env.SMOKE_ADMIN_PASSWORD }}
          WAIT_TIMEOUT: '180'

      - name: Collect compose readiness JSON
        if: always()
        run: |
          python3 scripts/operator-cutover-readiness.py \
            --environment compose-smoke \
            --api-url http://localhost:5000 \
            --dashboard-url http://localhost:8200 \
            --operator-email "${SMOKE_ADMIN_EMAIL}" || true
        env:
          OPERATOR_PASSWORD_ENV: SMOKE_ADMIN_PASSWORD
          SMOKE_ADMIN_PASSWORD: ${{ env.SMOKE_ADMIN_PASSWORD }}
          GATE_EF_MIGRATIONS_APPLIED: pass
          GATE_STRICT_READINESS: pass
          GATE_PARALLEL_RUN: pending
          GATE_SIGN_OFF: pending
          GATE_CUTOVER: pending
          GATE_BLAZOR_ROLLBACK_WINDOW: pending

      - name: Upload compose readiness artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compose-readiness-results
          path: artifacts/operator-cutover/
          if-no-files-found: ignore

      - name: Dump service logs on failure
        if: failure()
        run: |
          echo "=== backend-api logs ===" && docker compose -f docker/compose.yml -f docker/compose.smoke.yml logs --tail=100 backend-api || true
          echo "=== operator-dashboard logs ===" && docker compose -f docker/compose.yml -f docker/compose.smoke.yml logs --tail=100 operator-dashboard || true
          echo "=== migration logs ===" && docker compose -f docker/compose.yml -f docker/compose.smoke.yml logs --tail=100 migration || true

      - name: Tear down compose stack
        if: always()
        run: |
          if [[ "${{ env.KEEP_STACK }}" != "true" ]]; then
            docker compose -f docker/compose.yml -f docker/compose.smoke.yml down -v --remove-orphans
          fi
