name: dotnet-ci

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  django-dashboard-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Synaptix.OperatorDashboard.Django
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: Synaptix.OperatorDashboard.Django/requirements.txt

      - name: Install dashboard dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt

      - name: Ruff lint
        run: python -m pip install ruff && ruff check .

      - name: Django system checks
        run: python manage.py check

      - name: Run dashboard tests
        run: python manage.py test dashboard.tests

  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start Redis
        run: |
          docker run -d --name ci-redis -p 6379:6379 redis:7-alpine redis-server --requirepass synaptix_redis_password_123
          for i in {1..20}; do
            if docker exec ci-redis redis-cli -a synaptix_redis_password_123 ping | grep -q PONG; then
              exit 0
            fi
            sleep 1
          done
          docker logs ci-redis
          exit 1

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Restore
        run: dotnet restore TycoonTycoon_Backend.slnx

      - name: Build
        run: dotnet build TycoonTycoon_Backend.slnx --configuration Release --no-restore

      - name: Guard hardened error-envelope surfaces
        run: bash scripts/check-error-envelope-hardening.sh

      - name: Test
        run: |
          mkdir -p TestResults
          dotnet test Synaptix.Backend.Api.Tests/Synaptix.Backend.Api.Tests.csproj --configuration Release --no-build --verbosity normal --results-directory TestResults --logger "trx;LogFileName=build-test-results.trx"

      - name: Summarize failed tests
        if: always()
        run: |
          # Re-list every failure at the END of the log: per-test console output
          # scrolls out of reach on long runs, and the check run has no annotations.
          python3 - <<'PY'
          import glob, xml.etree.ElementTree as ET
          ns = {"t": "http://microsoft.com/schemas/VisualStudio/TeamTest/2010"}
          failed = []
          for trx in glob.glob("TestResults/**/*.trx", recursive=True):
              root = ET.parse(trx).getroot()
              for r in root.iter(f"{{{ns['t']}}}UnitTestResult"):
                  if r.get("outcome") == "Failed":
                      msg = r.find(f"{{{ns['t']}}}Output/{{{ns['t']}}}ErrorInfo/{{{ns['t']}}}Message")
                      failed.append((r.get("testName"), (msg.text or "")[:300] if msg is not None else ""))
          print(f"::group::FAILED TESTS ({len(failed)})")
          for name, msg in failed:
              print(f"FAILED: {name}")
              if msg:
                  print(f"    {msg}")
          print("::endgroup::")
          PY

      - name: Upload build test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-test-results
          path: TestResults/**/*.trx

  security-contract-tests:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start Redis
        run: |
          docker run -d --name ci-redis -p 6379:6379 redis:7-alpine redis-server --requirepass synaptix_redis_password_123
          for i in {1..20}; do
            if docker exec ci-redis redis-cli -a synaptix_redis_password_123 ping | grep -q PONG; then
              exit 0
            fi
            sleep 1
          done
          docker logs ci-redis
          exit 1

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Restore
        run: dotnet restore TycoonTycoon_Backend.slnx

      - name: Build
        run: dotnet build TycoonTycoon_Backend.slnx --configuration Release --no-restore

      - name: Guard hardened error-envelope surfaces
        run: bash scripts/check-error-envelope-hardening.sh

      - name: Run security contract tests (aggregate)
        run: |
          mkdir -p TestResults
          exit_code=0
          declare -a filters=(
            "AdminStorageEndpointsTests"
            "AdminAuthSecurityContractTests"
            "AdminNotificationsSecurityContractTests"
            "AdminSecurityAuditEndpointsTests"
            "AdminOpsKeyContractTests"
            "MatchSubmitRateLimitTests"
            "BannedPlayerCannotStartTests"
            "MatchmakingEnqueueModerationContractTests"
            "PartyEnqueueModerationContractTests"
            "PartyEnqueueConflictContractTests"
            "PartyInvitesValidationContractTests"
            "PartyEnqueueValidationContractTests"
            "PartyNotFoundContractTests"
            "AdminSeasonCloseTests"
            "AdminSeasonsNotFoundContractTests"
            "MatchQueryNotFoundContractTests"
            "UserProfileSecurityContractTests"
            "FriendsErrorEnvelopeContractTests"
            "MissionClaimErrorEnvelopeContractTests"
            "AnalyticsStartupEventCompatibilityTests"
          )
          for f in "${filters[@]}"; do
            echo "=== Running tests for filter: $f ==="
            dotnet test Synaptix.Backend.Api.Tests/Synaptix.Backend.Api.Tests.csproj --configuration Release --no-build --filter "FullyQualifiedName~${f}" --logger "trx;LogFileName=TestResults/${f}.trx" || exit_code=1
          done
          if [[ $exit_code -ne 0 ]]; then
            echo "One or more security contract tests failed."
            exit $exit_code
          fi

      - name: Upload security contract test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-contract-test-results
          path: TestResults/**/*.trx

  schema-validation:
    runs-on: ubuntu-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: '1'
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: '1'
      DOTNET_ENVIRONMENT: 'Development'
      ASPNETCORE_ENVIRONMENT: 'Development'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}

      - name: Install dotnet-ef
        run: dotnet tool install --global dotnet-ef

      - name: Add dotnet tools to PATH
        run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Restore
        run: dotnet restore TycoonTycoon_Backend.slnx

      - name: Build
        run: dotnet build TycoonTycoon_Backend.slnx --configuration Release --no-restore

      - name: Validate EF schema is in sync
        run: bash scripts/validate-ef-schema.sh

      - name: Generate idempotent migration SQL
        run: |
          mkdir -p artifacts/migrations
          dotnet ef migrations script \
            --idempotent \
            --project Synaptix.Backend.Migrations/Synaptix.Backend.Migrations.csproj \
            --startup-project Synaptix.MigrationService/Synaptix.MigrationService.csproj \
            --output artifacts/migrations/idempotent.sql \
            --no-build

      - name: Generate migration manifest
        run: |
          echo "{\"release\":\"alpha-beta-2026\",\"generatedAt\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"scriptFile\":\"idempotent.sql\",\"migrationProject\":\"Synaptix.Backend.Migrations\"}" \
            > artifacts/migrations/migration-manifest.json

      - name: Upload migration artifacts
        uses: actions/upload-artifact@v4
        with:
          name: migration-artifacts
          path: artifacts/migrations/

  health-pass-report:
    runs-on: ubuntu-latest
    needs: [build-test, schema-validation]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install dotnet-ef
        run: dotnet tool install --global dotnet-ef

      - name: Add dotnet tools to PATH
        run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Generate health pass report
        run: bash scripts/run-health-pass.sh

      - name: Upload health pass report artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-health-report
          path: docs/PROJECT_HEALTH_REPORT.md

      - name: Upload health pass command logs
        uses: actions/upload-artifact@v4
        with:
          name: project-health-pass-logs
          path: artifacts/health-pass

  personalization-guardrail-tests:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore TycoonTycoon_Backend.slnx

      - name: Build
        run: dotnet build TycoonTycoon_Backend.slnx --configuration Release --no-restore

      - name: Run personalization guardrail and sidecar tests
        run: |
          dotnet test Synaptix.Backend.Application.Tests/Synaptix.Backend.Application.Tests.csproj \
            --configuration Release --no-build \
            --filter "FullyQualifiedName~Personalization" \
            --verbosity normal \
            --results-directory TestResults \
            --logger "trx;LogFileName=personalization-guardrail-results.trx"

      - name: Upload personalization test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: personalization-guardrail-test-results
          path: TestResults/**/*.trx

  grpc-streaming-tests:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start Redis
        run: |
          docker run -d --name ci-redis -p 6379:6379 redis:7-alpine redis-server --requirepass synaptix_redis_password_123
          for i in {1..20}; do
            if docker exec ci-redis redis-cli -a synaptix_redis_password_123 ping | grep -q PONG; then
              exit 0
            fi
            sleep 1
          done
          docker logs ci-redis
          exit 1

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore TycoonTycoon_Backend.slnx

      - name: Build
        run: dotnet build TycoonTycoon_Backend.slnx --configuration Release --no-restore

      - name: Run gRPC-focused test suites
        run: |
          dotnet test Synaptix.Backend.Api.Tests/Synaptix.Backend.Api.Tests.csproj --configuration Release --no-build --filter "FullyQualifiedName~SidecarGrpcServiceTests"
          dotnet test Synaptix.Backend.Api.Tests/Synaptix.Backend.Api.Tests.csproj --configuration Release --no-build --filter "FullyQualifiedName~SidecarInferenceStoreTests"
          dotnet test Synaptix.Backend.Api.Tests/Synaptix.Backend.Api.Tests.csproj --configuration Release --no-build --filter "FullyQualifiedName~MobileMatchGrpcServiceTests"
          dotnet test Synaptix.Backend.Api.Tests/Synaptix.Backend.Api.Tests.csproj --configuration Release --no-build --filter "FullyQualifiedName~MobileMatchSessionTests"
